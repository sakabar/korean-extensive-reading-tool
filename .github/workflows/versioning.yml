name: Versioning

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select the semantic version increment. Runs fail if left on select-bump.
        required: true
        type: choice
        default: select-bump
        options:
          - select-bump
          - patch
          - minor
          - major
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs on develop
        run: |
          if [ "${GITHUB_REF_NAME}" != "develop" ]; then
            echo "Run this workflow from the develop branch."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run production build
        run: npm run build

      - name: Normalize release type
        id: release_type
        env:
          RAW_RELEASE_TYPE_EVENT: ${{ github.event.inputs.release_type }}
          RAW_RELEASE_TYPE_INPUTS: ${{ inputs.release_type }}
        run: |
          release_type="${RAW_RELEASE_TYPE_INPUTS:-${RAW_RELEASE_TYPE_EVENT:-}}"

          case "$release_type" in
            patch|minor|major)
              ;;
            ""|select-bump)
              echo "Select patch, minor, or major before running this workflow."
              exit 1
              ;;
            *)
              echo "Unsupported release_type: $release_type"
              exit 1
              ;;
          esac

          echo "value=$release_type" >> "$GITHUB_OUTPUT"

      - name: Log versioning inputs
        env:
          RAW_RELEASE_TYPE_EVENT: ${{ github.event.inputs.release_type }}
          RAW_RELEASE_TYPE_INPUTS: ${{ inputs.release_type }}
          NORMALIZED_RELEASE_TYPE: ${{ steps.release_type.outputs.value }}
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          echo "raw_release_type_event=${RAW_RELEASE_TYPE_EVENT:-<empty>}"
          echo "raw_release_type_inputs=${RAW_RELEASE_TYPE_INPUTS:-<empty>}"
          echo "normalized_release_type=${NORMALIZED_RELEASE_TYPE}"
          echo "version_before=$(node -p "require('./package.json').version")"

      - name: Bump application version
        env:
          RELEASE_TYPE: ${{ steps.release_type.outputs.value }}
        run: npm version "$RELEASE_TYPE" --no-git-tag-version

      - name: Log bumped version
        run: echo "version_after=$(node -p "require('./package.json').version")"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $(node -p "require('./package.json').version")"
          git push origin HEAD:develop

      - name: Read bumped version
        id: bumped_version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create or update develop to main pull request
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.bumped_version.outputs.value }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `v${process.env.VERSION}`;
            const body = [
              'Automated version bump PR created by the Versioning workflow.',
              '',
              `Version: \`${title}\``,
            ].join('\n');

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'main',
              head: `${owner}:develop`,
              per_page: 10,
            });

            if (pulls.length > 0) {
              const pull = pulls[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                title,
                body,
              });
              core.info(`Updated pull request #${pull.number} to title ${title}.`);
              return;
            }

            const { data: pull } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              body,
              head: 'develop',
              base: 'main',
            });
            core.info(`Created pull request #${pull.number} with title ${title}.`);

  release-on-main:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read application version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.version.outputs.value }}`,
              name: `v${{ steps.version.outputs.value }}`,
              generate_release_notes: true,
              target_commitish: context.sha,
            });
